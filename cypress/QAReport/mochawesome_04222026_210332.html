le to use the type command on it, if the element is not typeable then it will throw an error because it cannot type on it\n//.type(\&quot;text\&quot;, {force: true}) (covered by another elemnet)to force the command to be executed even if the element is not visible or not enabled, it should be used with caution because it can cause unexpected behavior in the test and it can also cause the test to fail if the element is not interactable&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;9e0f41c1-2d8f-45af-8fc0-edcf088d9777&quot;,&quot;parentUUID&quot;:&quot;8c66157c-4745-45c3-800f-812aa23f3593&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Select Command&quot;,&quot;fullTitle&quot;:&quot;Action Lesson Select Command&quot;,&quot;duration&quot;:402,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;//select for dropdowns and select options from the dropdown\n//select(text or value or index(where he is in the options), options) to select the option from the dropdown by its text or value or index\ncy.get(&#x27;#country&#x27;).select(\&quot;Egypt\&quot;); //to select the option with the text \&quot;Egypt\&quot; from the dropdown\ncy.pause();\ncy.get(&#x27;#country&#x27;).select(\&quot;jordan_country\&quot;); //to select the option with the value \&quot;jordan_country\&quot; from the dropdown\ncy.pause();\ncy.get(&#x27;#country&#x27;).select(0); //to select the option with the index 0 from the dropdown\n//with index 3 it will give error because there are only 3 options in the dropdown and the index starts from 0 so the last option has the index 2&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;99796892-d5d0-46f8-b2fe-2ac846ce1e4c&quot;,&quot;parentUUID&quot;:&quot;8c66157c-4745-45c3-800f-812aa23f3593&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Check Command and uncheak&quot;,&quot;fullTitle
